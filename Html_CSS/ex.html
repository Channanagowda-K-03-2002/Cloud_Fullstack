<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBM Confidential</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #F4F4F4;
        }

        .container {
            text-align: center;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        .fields {
            padding: 8px;
            margin: 5px;
            width: 250px;
        }

        #logbtn {
            background-color: blue;
            color: white;
            width: 120px;
            height: 35px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #logbtn:hover {
            background-color: darkblue;
        }
    </style>

    <script>
        function login() {
            let username = document.getElementById("username").value;
            let email = document.getElementById("email").value;
            let password = document.getElementById("password").value;
            let age = document.getElementById("age").value;
            let gender = document.getElementById("gender").value;

            console.log(username, email, password, age, gender);

            alert(
                `Username: ${username}\nEmail: ${email}\nAge: ${age}\nGender: ${gender}`
            );
        }
    </script>
</head>

<body>
    <div class="container">
        <h1>IBM Confidentiality Form</h1>

        <input id="username" class="fields" type="text" placeholder="Enter Username"><br>
        <input id="email" class="fields" type="email" placeholder="Enter Email"><br>
        <input id="password" class="fields" type="password" placeholder="Enter Password"><br>
        <input id="age" class="fields" type="number" placeholder="Enter Age"><br>
        <input id="gender" class="fields" type="text" placeholder="Enter Gender"><br><br>

        <button id="logbtn" onclick="login()">Login</button>
    </div>
</body>
</html>
